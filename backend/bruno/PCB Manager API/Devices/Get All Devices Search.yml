info:
  name: Get All Devices Search
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/devices/search"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "name": "Device 1"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
