info:
  name: Get All Projects
  type: http
  seq: 1

http:
  method: GET
  url: '{{baseUrl}}/projects?page=1&limit=20'
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: page
      value: '1'
      type: query
    - name: limit
      value: '20'
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
