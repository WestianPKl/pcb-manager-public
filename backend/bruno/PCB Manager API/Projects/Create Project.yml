info:
  name: Create Project
  type: http
  seq: 4

http:
  method: POST
  url: '{{baseUrl}}/projects'
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: '{ "name": "Project 1", "description": "Description of Project 1"}'
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
