info:
  name: Update Access Level
  type: http
  seq: 3

http:
  method: PUT
  url: "{{baseUrl}}/admin/access-levels/5"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |2-
        {
          "accessLevel": 5,
          "name": "WRITE"
        }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
