info:
  name: Create Access Level
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/admin/access-levels"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |2-
        {
          "accessLevel": 5,
          "name": "READ"
        }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
