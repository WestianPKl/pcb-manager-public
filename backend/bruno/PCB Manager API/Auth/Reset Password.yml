info:
  name: Reset Password
  type: http
  seq: 10

http:
  method: POST
  url: "{{baseUrl}}/auth/reset-password"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      { 
        "token": "ABC",
        "password ": "DEF"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
