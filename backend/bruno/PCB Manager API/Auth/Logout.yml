info:
  name: Logout
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/auth/logout"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
    - name: Cookie
      value: refresh_token={{refreshToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
