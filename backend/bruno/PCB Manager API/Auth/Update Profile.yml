info:
  name: Update Profile
  type: http
  seq: 7

http:
  method: POST
  url: "{{baseUrl}}/auth/profile"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      { 
        "username": "ABC",
        "name": "DEF",
        "surname": "GHI",
        "email": "abc@def.ghi"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
