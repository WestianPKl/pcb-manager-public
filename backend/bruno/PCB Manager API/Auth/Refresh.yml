info:
  name: Refresh
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/auth/refresh"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const token = res.body.accessToken
        bru.setEnvVar("accessToken", token)

        const cookie = res.headers['set-cookie']
        if (cookie) {
          const refreshToken = cookie[0].split(';')[0].split('=')[1]
          bru.setEnvVar("refreshToken", refreshToken)
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
