info:
  name: Forgot Password
  type: http
  seq: 9

http:
  method: POST
  url: "{{baseUrl}}/auth/forgot-password"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      { 
        "email": "abc@def.ghi"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
