info:
  name: Update Password
  type: http
  seq: 8

http:
  method: POST
  url: "{{baseUrl}}/auth/password"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      { 
        "currentPassword": "ABC",
        "newPassword": "DEF"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
